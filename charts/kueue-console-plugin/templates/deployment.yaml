apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kueue-console-plugin.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kueue-console-plugin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.plugin.replicas }}
  selector:
    matchLabels:
      {{- include "kueue-console-plugin.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        {{- include "kueue-console-plugin.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.plugin.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.plugin.imagePullSecrets | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kueue-console-plugin.serviceAccountName" . }}
      {{- if .Values.plugin.podSecurityContext.enabled }}
      securityContext:
        runAsNonRoot: {{ .Values.plugin.podSecurityContext.runAsNonRoot }}
        seccompProfile:
          type: {{ .Values.plugin.podSecurityContext.seccompProfile.type }}
      {{- end }}
      containers:
        - name: {{ include "kueue-console-plugin.name" . }}
          image: {{ .Values.plugin.image }}
          imagePullPolicy: {{ .Values.plugin.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.plugin.port }}
              protocol: TCP
          {{- if .Values.plugin.containerSecurityContext.enabled }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.plugin.containerSecurityContext.allowPrivilegeEscalation }}
            capabilities:
              drop:
                {{- toYaml .Values.plugin.containerSecurityContext.capabilities.drop | nindent 16 }}
          {{- end }}
          resources:
            {{- toYaml .Values.plugin.resources | nindent 12 }}
          volumeMounts:
            - name: plugin-serving-cert
              readOnly: true
              mountPath: /var/cert
            - name: nginx-conf
              readOnly: true
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: plugin-serving-cert
          secret:
            secretName: {{ include "kueue-console-plugin.certificateSecretName" . }}
            defaultMode: 420
        - name: nginx-conf
          configMap:
            name: {{ include "kueue-console-plugin.name" . }}
            defaultMode: 420
